name: Build and Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material mkdocstrings ghp-import

      - name: Build Certus Flex
        run: python -m mkdocs build -f mkdocs.flex.en.yml -d site/certus-flex

      - name: Build Certus Rivo
        run: python -m mkdocs build -f mkdocs.rivo.en.yml -d site/certus-rivo

      - name: Generate combined index
        run: |
          mkdir -p site
          cat <<EOF > site/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Certus Documentation</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px }
              a { display: block; padding: 16px; margin: 12px 0; border: 1px solid #ddd; border-radius: 8px; text-decoration: none; color: #333; font-size: 18px }
              a:hover { background: #f5f5f5 }
            </style>
          </head>
          <body>
            <h1>Certus Documentation</h1>
            <a href="certus-flex/">Certus Flex Documentation</a>
            <a href="certus-rivo/">Certus Rivo Documentation</a>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        run: ghp-import -n -p -f site
