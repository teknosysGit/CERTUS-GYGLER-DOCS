    en: "CERTUS FLEX is a compact, modular and versatile dispensing system for precise and repeatable dispensing of fluids in the micro to milliliter range."
    de: "CERTUS FLEX ist ein kompaktes, modulares und vielseitiges Dosiersystem für die präzise und wiederholbare Dosierung von Flüssigkeiten im Mikro- bis Milliliterbereich."
  software:
    name:
      en: "CERTUS CONTROL"
      de: "CERTUS CONTROL"
    version: "V 2.1.19"
    releaseDate: "February 2026"
    releaseDateDE: "Februar 2026"
  productImageURL: "https://teknosysgit.github.io/CERTUS-GYGER-DOCS/certus-flex/en/products/certus-flex/_assets/images/certus_flex.png"
  pdf:
    coverTitle: "User Manual"
    coverTitleDE: "Benutzerhandbuch"
    coverSubtitle: "With CERTUS CONTROL 2.1.19"
    coverSubtitleDE: "Mit CERTUS CONTROL 2.1.19"
    outputPath: "pdf/User_Manual_CERTUS_FLEX_EN.pdf"
    outputPathDE: "pdf/User_Manual_CERTUS_FLEX_DE.pdf"
