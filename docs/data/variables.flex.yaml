# -------------------------------------------------------
# variables.flex.yaml
# Loaded after variables.yaml for CERTUS FLEX builds.
# Defines variables.product.* as an alias to Flex values.
# In any markdown file, use variables.product.* for the
# active product regardless of which build is running.
# -------------------------------------------------------

product:
  id: "flex"                  # use this in {% if %} conditions
  name:
    en: "CERTUS FLEX"
    de: "CERTUS FLEX"
  shortName:
    en: "CF"
    de: "CF"
  tagline:
    en: "A fully automatic, contactless dispenser for a variety of fluids into well plates."
    de: "Ein vollautomatischer, berührungsloser Dispenser für eine Vielzahl von Flüssigkeiten in Wellplatten."
