  - Dimensions: en/products/certus-rivo/specifications_dimensions.md
  - Device Data: en/products/certus-rivo/specifications_device_data.md
  - Assembly and Operation: en/products/certus-rivo/assembly_and_operation.md
  - Certus Control: en/products/certus-rivo/certus_controls.md
  - Operation: en/products/certus-rivo/operations.md
  - Troubleshooting: en/products/certus-rivo/troubleshooting.md
