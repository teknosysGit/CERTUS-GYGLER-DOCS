# -------------------------------------------------------
# mkdocs.rivo.en.yml -- CERTUS RIVO - English
#
# docs_dir: docs  (inherited from mkdocs.base.yml)
# site_dir: site/rivo/en
# -------------------------------------------------------

INHERIT: mkdocs.base.yml

site_name: "Certus Knowledgebase - CERTUS RIVO"
site_description: "User Manual for CERTUS RIVO by Fritz Gyger AG"
site_url: https://teknosysgit.github.io/CERTUS-GYGER-DOCS/certus-rivo/
site_dir: site

theme:
  language: en

plugins:
  - search:
      lang: en
      separator: '[\s\-]+'
      prebuild_index: true
      indexing: full
      min_search_length: 3
  - mkdocstrings:
      default_handler: python
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: true
      caption_position: bottom
      background: "#e3e3e3"
      shadow: true
      manual: true
  - table-of-figures:
      directive_identifier: 'table-of-figures'
      figure_types:
        - image
        - table
      custom_templates_path: null
      translations_overrides_path: docs/configurations/javascripts/translations_overrides.json
      caption_identifier_description_separator: ' - '
      sections_breadcrumb_separator: ' > '
  - macros:
      include_yaml:
        - variables: docs/data/variables.yaml
        - variables: docs/data/variables.rivo.yaml
      on_error_fail: false
      include_dir: docs/common_content
  - with-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      debug_html: true
      show_anchors: true
      verbose: true

      # -------------------------------------------------------
      # OUTPUT FILE (MUST MATCH pdfDownloadPath + JS)
      # -------------------------------------------------------
      output_path: pdf/User_Manual_CERTUS_RIVO_EN.pdf

      # -------------------------------------------------------
      # COVER PAGE
      # -------------------------------------------------------
      cover: true
      back_cover: false
      author: Fritz Gyger AG
      copyright: "© Fritz Gyger AG. All rights reserved."
      cover_title: "User Manual"
      cover_subtitle: "CERTUS RIVO"
      cover_logo: "_shared_assets/company_logo.png"

      # -------------------------------------------------------
      # METADATA
      # -------------------------------------------------------
      metadata:
        title: "User Manual - CERTUS RIVO"
        author: "Fritz Gyger AG"
        subject: "CERTUS RIVO Documentation"

      # -------------------------------------------------------
      # PDF STRUCTURE SETTINGS
      # -------------------------------------------------------
      toc_title: "Table of Contents"
      toc_level: 3
      ordered_chapter_level: 3

      # -------------------------------------------------------
      # Custom Template Path
      # -------------------------------------------------------
      custom_template_path: docs/configurations/templates/rivo-pdf/

      # -------------------------------------------------------
      # Exclude pages from the PDF
      # -------------------------------------------------------
      exclude_pages:
        - 'en/products/certus-rivo/table_of_figures'

extra:
  alternate:
    - name: English
      link: /docs/rivo/en/
      lang: en
    - name: Deutsch
      link: /docs/rivo/de/
      lang: de
  companyLogoURL: "https://teknosysgit.github.io/CERTUS-GYGER-DOCS/certus-rivo/_shared_assets/company_logo_light.png"
  pdfHeaderLogoURL: "https://teknosysgit.github.io/CERTUS-GYGER-DOCS/certus-rivo/_shared_assets/company_logo_small.png"
  ui_labels:
    en:
      print: "Print PDF"
      download: "Download PDF"
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/fritz-gyger-ag/
      name: LinkedIn
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/fritzgygerag
      name: Facebook
    - icon: fontawesome/brands/twitter
      link: https://www.fgyger.ch/
      name: Company Website

  banner_message: "Save this page using File > Print > Save as PDF"
  announce: "Documentation available in English and German."
  generator: false
  sharedAssetsFolder: _shared_assets
  helpSiteName: "Certus Knowledgebase Site"
  pdfGuideName: "User Manual"
  pdfProductName: "CERTUS RIVO"
  pdfProductSubtitle: "with CERTUS CONTROL 2.1.19"
  pdfProductVersion: "V12.0"
  pdfVersion: "v1.0"
  pdfPublishingDate: "February 2026"
  company: "Fritz Gyger AG"
  company_logo_url: "_shared_assets/company_logo.png"
  watermark: "SAMPLE"
  page_size: "A4"
  pdfDownloadPath: "pdf/User_Manual_CERTUS_RIVO_EN.pdf"

